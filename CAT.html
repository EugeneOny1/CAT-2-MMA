<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildlife Conservation</title>
    
    <style>
        /* Responsive Design and Accessibility (CSS) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #2c5e1a;
            margin-bottom: 1.5rem;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
        }

        /* 16:9 Aspect Ratio wrapper for YouTube iframe */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            margin-bottom: 1rem;
            overflow: hidden;
            border-radius: 4px;
        }

        /* Absolute positioning makes the iframe responsive */
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .description {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: #555;
        }

        .action-btn {
            background-color: #2c5e1a;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .action-btn:focus, 
        .action-btn:hover {
            background-color: #1a3b10;
            outline: 3px solid #7bc05b;
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <main class="content-container">
        <!-- 1. Heading -->
        <h1>Save Our Wildlife</h1>

        <div class="video-wrapper" id="videoWrapper">
            <!-- 2. Video Placeholder: The YouTube API will inject the iframe here -->
            <div id="wildlifeVideo"></div>
        </div>

        <!-- 3. Short description -->
        <p class="description">
            Join our mission to protect endangered species and preserve natural habitats, like the Karura Forest, for future generations. Every action counts.
        </p>

        <!-- 4. Toggle Button -->
        <button id="toggleBtn" class="action-btn" aria-controls="videoWrapper">
            Hide Video
        </button>
    </main>

    <!-- Load the YouTube Iframe API Script -->
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <script>
        // 5. JavaScript for Button & API Logic
        let player;
        const videoWrapper = document.getElementById('videoWrapper');
        const toggleBtn = document.getElementById('toggleBtn');
        let isVideoVisible = true;

        // This function fires automatically once the YouTube API is loaded
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('wildlifeVideo', {
                videoId: 'ZdN4B_nv6Js', // The ID for the Kipchoge/Karura video
                playerVars: {
                    'playsinline': 1,
                    'controls': 1 // Ensures playback controls are visible
                }
            });
        }

        // Custom Button Logic
        toggleBtn.addEventListener('click', () => {
            // Check if the player is fully loaded first
            if (!player || typeof player.pauseVideo !== 'function') return; 

            if (isVideoVisible) {
                // If visible, pause the video, hide it, and update button text
                player.pauseVideo();
                videoWrapper.style.display = 'none';
                toggleBtn.textContent = 'Play Video';
                isVideoVisible = false;
            } else {
                // If hidden, show the video, play it, and update button text
                videoWrapper.style.display = 'block';
                player.playVideo();
                toggleBtn.textContent = 'Hide Video';
                isVideoVisible = true;
            }
        });
    </script>

</body>
</html>
